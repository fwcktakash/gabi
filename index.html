<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabi...</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif;}

body{
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#fff;
}

/* sangue */
.drop{
  position:absolute;
  top:-20px;
  width:2px;
  height:15px;
  background:red;
  opacity:0.6;
  animation:fall linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* TELA HACKER (GATILHO) */
.hacker{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:30;
  text-align:center;
  cursor: pointer;
  transition: opacity 0.8s;
}

.hacker p{
  font-size:0.9em;
  color:#ff4d6d;
  margin-top:10px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* CAPA */
.cover{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.music-cover{
  width:200px;
  height:200px;
  border-radius:12px;
  overflow:hidden;
  animation:heartbeat 1.2s infinite;
  box-shadow:0 0 25px red;
}

.music-cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes heartbeat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

button{
  margin-top:20px;
  padding:12px 25px;
  background:#8b0000;
  border:none;
  border-radius:20px;
  color:#fff;
  cursor: pointer;
}

/* carta */
.envelope{
  width:90%;
  max-width:320px;
  height:220px;
  background:#200;
  position:relative;
  display:none;
  cursor: pointer;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#400;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
  z-index: 5;
}

.letter{
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  padding:20px;
  transform:translateY(0);
  transition:1s;
  text-align:center;
  z-index: 2;
}

.open .flap{ transform:rotateX(180deg); z-index: 1;}
.open .letter{ transform:translateY(-50%); z-index: 10; height: auto; min-height: 250px;}

/* texto */
.text{margin-top:10px;font-size:0.95em;}
.pergunta{margin-top:10px;color:#ff4d6d;}
.ass{margin-top:10px;font-size:0.8em;color:#ff99aa;}
.msg{margin-top:10px;display:none;}

h2{
  color:#ff4d6d;
  text-shadow:0 0 10px red;
}
</style>
</head>

<body>

<!-- TELA HACKER (O clique aqui libera o som) -->
<div class="hacker" id="hacker" onclick="ativarTudo()">
  <h2 id="hacktext">CLIQUE PARA CONECTAR...</h2>
  <p id="subtext">estabelecendo conexão segura</p>
</div>

<!-- CAPA -->
<div class="cover" id="cover">
  <div class="music-cover">
    <img src="vampire.png" alt="Capa">
  </div>
  <button onclick="irParaCarta()">toca aqui sua linda 🩸</button>
</div>

<!-- CARTA -->
<div class="envelope" id="env" onclick="openLetter()">
  <div class="flap"></div>

  <div class="letter">
    <h2>Gabi...</h2>
    <p class="text" id="typing"></p>
    <p class="pergunta">me perdoa? 💔</p>
    <p class="ass">swaglean33 te ama 🖤</p>

    <div style="display: flex; justify-content: center; gap: 10px;">
        <button onclick="yes(event)">sim 💖</button>
        <button onclick="no(event)" id="noBtn">não 💔</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- O IFRAME DO YOUTUBE (Fica oculto) -->
<iframe id="music" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>

<script>
let started = false;
const iframe = document.getElementById("music");

/* 1. FUNÇÃO DISPARADA NO PRIMEIRO CLIQUE */
function ativarTudo() {
  if (!started) {
    started = true;
    
    // Toca a música imediatamente
    iframe.src = "https://youtube.com";

    // Inicia o texto hacker
    document.getElementById("hacktext").innerHTML = "";
    hackType();

    // Aguarda um pouco para mostrar a capa (enquanto a música já toca)
    setTimeout(() => {
      document.getElementById("hacker").style.opacity = "0";
      setTimeout(() => {
        document.getElementById("hacker").style.display = "none";
        document.getElementById("cover").style.display = "flex";
      }, 800);
    }, 3500);
  }
}

/* EFEITO DE DIGITAÇÃO HACKER */
const hackStr = "inicializando conexão emocional com gabi...";
let h = 0;

function hackType(){
  const el = document.getElementById("hacktext");
  if(h < hackStr.length){
    el.innerHTML += hackStr.charAt(h);
    h++;
    setTimeout(hackType, 50);
  }
}

/* MUDAR PARA A CARTA */
function irParaCarta(){
  document.getElementById("cover").style.display="none";
  document.getElementById("env").style.display="block";
}

/* LÓGICA DA CARTA */
let typed=false;
function openLetter(){
  const env=document.getElementById("env");
  env.classList.toggle("open");

  if(!typed){
    startTyping();
    typed=true;
  }
}

const text="mesmo com minhas brincadeiras bobas... eu amo muito você 💔";
let i=0;
function startTyping(){
  const el=document.getElementById("typing");
  if(i < text.length){
    el.innerHTML += text.charAt(i);
    i++;
    setTimeout(startTyping, 40);
  }
}

function yes(e){
  e.stopPropagation();
  const msg = document.getElementById("msg");
  msg.style.display="block";
  msg.innerText="eu te amo ❤️";
}

function no(e){
  e.stopPropagation();
  const btn=document.getElementById("noBtn");
  const x=Math.random()*(window.innerWidth-100);
  const y=Math.random()*(window.innerHeight-50);
  btn.style.position="fixed";
  btn.style.left=x+"px";
  btn.style.top=y+"px";
  
  const msg = document.getElementById("msg");
  msg.style.display="block";
  msg.innerText="vc é mt chata cara 😭";
}
</script>

</body>
</html>
