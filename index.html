<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabi...</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif;}

body{
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#fff;
}

/* sangue */
.drop{
  position:absolute;
  top:-20px;
  width:2px;
  height:15px;
  background:red;
  opacity:0.6;
  animation:fall linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* HACKER SCREEN */
.hacker{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:30;
  text-align:center;
}

.hacker h2{
  color:#ff4d6d;
  text-shadow:0 0 10px red;
}

/* CAPA */
.cover{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.music-cover{
  width:200px;
  height:200px;
  border-radius:12px;
  overflow:hidden;
  animation:heartbeat 1.2s infinite;
  box-shadow:0 0 25px red;
}

.music-cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes heartbeat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

button{
  margin-top:20px;
  padding:12px 25px;
  background:#8b0000;
  border:none;
  border-radius:20px;
  color:#fff;
  font-size:1em;
  cursor:pointer;
}

/* CARTA */
.envelope{
  width:90%;
  max-width:320px;
  height:220px;
  background:#200;
  position:relative;
  display:none;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#400;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
}

.letter{
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  padding:20px;
  transform:translateY(100%);
  transition:1s;
  text-align:center;
}

.open .flap{transform:rotateX(180deg);}
.open .letter{transform:translateY(0);}

/* TEXTOS */
.text{margin-top:10px;font-size:0.95em;}
.pergunta{margin-top:10px;color:#ff4d6d;}
.ass{margin-top:10px;font-size:0.8em;color:#ff99aa;}
.msg{margin-top:10px;display:none;}

h2{
  color:#ff4d6d;
  text-shadow:0 0 10px red;
}
</style>
</head>

<body>

<!-- HACKER INTRO -->
<div class="hacker" id="hacker">
  <h2>inicializando conexão emocional...</h2>
  <button onclick="enter()">está pronta? 🩸</button>
</div>

<!-- CAPA -->
<div class="cover" id="cover">
  <div class="music-cover">
    <img src="vampire.png">
  </div>
  <button onclick="start()">toca aqui sua linda 🩸</button>
</div>

<!-- CARTA -->
<div class="envelope" id="env" onclick="openLetter()">
  <div class="flap"></div>

  <div class="letter">
    <h2>Gabi...</h2>

    <p class="text" id="typing"></p>

    <p class="pergunta">me perdoa? 💔</p>

    <p class="ass">swaglean33 te ama 🖤</p>

    <button onclick="yes(event)">sim 💖</button>
    <button onclick="no(event)" id="noBtn">não 💔</button>

    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- MÚSICA -->
<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* =========================
   ENTRADA (TOCA NA HORA)
========================= */
function enter(){
  const iframe=document.getElementById("music");

  iframe.src =
  "https://www.youtube.com/embed/hoa_oc3jBbo?start=26&autoplay=1";

  document.getElementById("hacker").style.display="none";
  document.getElementById("cover").style.display="flex";
}

/* =========================
   START
========================= */
function start(){
  document.getElementById("cover").style.display="none";
  document.getElementById("env").style.display="block";
}

/* =========================
   CARTA
========================= */
let typed=false;

function openLetter(){
  const env=document.getElementById("env");
  env.classList.toggle("open");

  if(!typed){
    startTyping();
    typed=true;
  }
}

/* TEXTO */
const text="mesmo com minhas brincadeiras bobas... eu ainda amo muito você 💔";
let i=0;

function startTyping(){
  const el=document.getElementById("typing");

  function type(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

/* BOTÃO SIM */
function yes(e){
  e.stopPropagation();
  document.getElementById("msg").style.display="block";
  document.getElementById("msg").innerText="eu te amo ❤️";
}

/* BOTÃO NÃO */
function no(e){
  e.stopPropagation();

  const btn=document.getElementById("noBtn");

  const x=Math.random()*(window.innerWidth-100);
  const y=Math.random()*(window.innerHeight-50);

  btn.style.position="absolute";
  btn.style.left=x+"px";
  btn.style.top=y+"px";

  document.getElementById("msg").style.display="block";
  document.getElementById("msg").innerText="vc é mt chata cara 😭";
}

/* SANGUE */
function createDrop(){
  const drop=document.createElement("div");
  drop.classList.add("drop");
  drop.style.left=Math.random()*100+"vw";
  drop.style.animationDuration=(Math.random()*2+2)+"s";
  document.body.appendChild(drop);

  setTimeout(()=>drop.remove(),3000);
}
setInterval(createDrop,120);

</script>

</body>
</html>
