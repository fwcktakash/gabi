<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabi...</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif;}

body{
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:#fff;
}

/* sangue */
.drop{
  position:absolute;
  top:-20px;
  width:2px;
  height:15px;
  background:red;
  opacity:0.6;
  animation:fall linear infinite;
  z-index:999;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* HACKER */
.hacker{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:30;
  text-align:center;
}

.hacker h2{
  color:#00ff9f;
  text-shadow:0 0 10px #00ff9f;
  font-family:monospace;
}

/* CAPA */
.cover{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.music-cover{
  width:200px;
  height:200px;
  border-radius:12px;
  overflow:hidden;
  animation:heartbeat 1.2s infinite;
  box-shadow:0 0 25px red;
}

/* CARTA */
.envelope{
  width:90%;
  max-width:320px;
  height:220px;
  background:#200;
  position:relative;
  display:none;
  z-index:10;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#400;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
}

.letter{
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  padding:20px;
  transform:translateY(100%);
  transition:1s;
  text-align:center;
}

.open .flap{transform:rotateX(180deg);}
.open .letter{transform:translateY(0);}

/* DICA DA CARTA */
.hint2{
  position:absolute;
  top:calc(50% + 140px);
  left:50%;
  transform:translateX(-50%);
  font-size:0.9em;
  color:#ff99aa;
  opacity:0.8;
  animation:pulse 1.5s infinite;
  z-index:15;
  display:none;
}

@keyframes pulse{
  0%,100%{opacity:0.4;}
  50%{opacity:1;}
}

button{
  margin-top:20px;
  padding:12px 25px;
  background:#8b0000;
  border:none;
  border-radius:20px;
  color:#fff;
  cursor:pointer;
}

.msg{margin-top:10px;display:none;}
</style>
</head>

<body>

<!-- HACKER -->
<div class="hacker" id="hacker">
  <h2 id="loadingText"></h2>
  <button onclick="enter()">está pronta? 🩸</button>
</div>

<!-- CAPA -->
<div class="cover" id="cover">
  <div class="music-cover">
    <img src="vampire.png">
  </div>
  <button onclick="start()">toca aqui sua linda 🩸</button>
</div>

<!-- CARTA -->
<div class="envelope" id="env" onclick="openLetter()">
  <div class="flap"></div>
  <div class="letter">
    <h2>Gabi...</h2>
    <p id="typing"></p>
    <p style="color:#ff4d6d;">me perdoa? 💔</p>

    <button onclick="yes(event)">sim 💖</button>
    <button onclick="no(event)" id="noBtn">não 💔</button>

    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- 🔥 DICA -->
<div class="hint2" id="hint2">abre a cartinha &lt;3</div>

<!-- MÚSICA -->
<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* loading hacker */
const textLoading="loading...";
let li=0;

function typeLoading(){
  const el=document.getElementById("loadingText");

  function type(){
    if(li<textLoading.length){
      el.innerHTML+=textLoading.charAt(li);
      li++;
      setTimeout(type,80);
    }
  }
  type();
}

/* preload música */
window.onload=function(){
  typeLoading();

  const iframe=document.getElementById("music");
  iframe.src="https://www.youtube.com/embed/kJAE5Ufm5Zs?start=20&autoplay=1&mute=1";
}

/* ativa som no primeiro clique */
document.addEventListener("click", function firstClick(){
  const iframe=document.getElementById("music");

  iframe.src="https://www.youtube.com/embed/kJAE5Ufm5Zs?start=20&autoplay=1";

  document.removeEventListener("click", firstClick);
});

/* telas */
function enter(){
  document.getElementById("hacker").style.display="none";
  document.getElementById("cover").style.display="flex";
}

function start(){
  document.getElementById("cover").style.display="none";
  document.getElementById("env").style.display="block";
  document.getElementById("hint2").style.display="block";
}

/* carta */
let typed=false;

function openLetter(){
  const env=document.getElementById("env");
  env.classList.toggle("open");

  document.getElementById("hint2").style.display="none";

  if(!typed){
    startTyping();
    typed=true;
  }
}

const text="mesmo com minhas brincadeiras bobas... eu ainda amo muito você 💔";
let i=0;

function startTyping(){
  const el=document.getElementById("typing");

  function type(){
    if(i<text.length){
      el.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

function yes(e){
  e.stopPropagation();
  document.getElementById("msg").style.display="block";
  document.getElementById("msg").innerText="eu te amo ❤️";
}

function no(e){
  e.stopPropagation();
  document.getElementById("noBtn").remove();
  document.getElementById("msg").style.display="block";
  document.getElementById("msg").innerText="vc é mt chata cara 😭";
}

/* sangue */
function createDrop(){
  const drop=document.createElement("div");
  drop.classList.add("drop");
  drop.style.left=Math.random()*100+"vw";
  drop.style.animationDuration=(Math.random()*2+2)+"s";
  document.body.appendChild(drop);

  setTimeout(()=>drop.remove(),3000);
}
setInterval(createDrop,120);

</script>

</body>
</html>
