<script>
let musicStarted = false;

/* música */
function initMusic(){
  const iframe = document.getElementById("music");
  iframe.src =
  "https://www.youtube.com/embed/hoa_oc3jBbo?start=26&autoplay=1&mute=1";
}

function start(){
  document.getElementById("cover").style.display="none";
  document.getElementById("env").style.display="block";

  const iframe = document.getElementById("music");
  iframe.src =
  "https://www.youtube.com/embed/hoa_oc3jBbo?start=26&autoplay=1";

  startTyping();
}

window.onload = initMusic;

/* carta */
function openLetter(){
  document.getElementById("env").classList.toggle("open");
}

/* TEXTO HACKER FOFO */
const text = "mesmo com minhas brincadeiras idiotas... eu nunca deixei de te amar nem por um segundo 💔 eu só quero você, gabi...";

let i = 0;

function startTyping(){
  const el = document.getElementById("typing");

  function type(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 40);
    }
  }

  type();
}

/* botão SIM */
function yes(e){
  e.stopPropagation();
  document.getElementById("msg").style.display="block";
}

/* botão NÃO fugindo */
function no(e){
  e.stopPropagation();
  const btn = document.getElementById("noBtn");

  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* sangue */
function createDrop(){
  const drop = document.createElement("div");
  drop.classList.add("drop");
  drop.style.left = Math.random()*100+"vw";
  drop.style.animationDuration = (Math.random()*2+2)+"s";
  document.body.appendChild(drop);

  setTimeout(()=>drop.remove(),3000);
}
setInterval(createDrop,100);
</script>
